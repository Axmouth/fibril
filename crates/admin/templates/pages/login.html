<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <div class="login-brand">
        <span class="mark" aria-hidden="true">
          <span></span>
          <span></span>
        </span>
        <span>fibril admin</span>
      </div>
      <h1>Sign in</h1>
      <p>Use your admin credentials to open the dashboard.</p>
      {% if let Some(message) = error %}
        <div class="settings-message" data-kind="error">{{ message }}</div>
      {% endif %}
      <form method="post" action="/login" class="login-form">
        <label>
          Username
          <input name="username" autocomplete="username" required>
        </label>
        <label>
          Password
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="btn btn-primary" type="submit">Sign in</button>
      </form>
    </section>
  </main>
  <script>
    (() => {
      const stored = window.localStorage.getItem("fibril-admin-theme");
      const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
      document.documentElement.dataset.theme = stored || (prefersLight ? "light" : "dark");
    })();
  </script>
</body>
</html>
