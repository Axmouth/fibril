<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <div class="login-brand">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <path d="M3 19C7 15 5.5 8 11 3" stroke="var(--accent)" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M6 19.5C9.5 16 9 9 14.5 4.5" stroke="var(--accent)" stroke-width="1.7" stroke-linecap="round" opacity=".62"/>
          <path d="M9.5 20C12.5 17 12.5 10.5 18 6.5" stroke="var(--accent)" stroke-width="1.7" stroke-linecap="round" opacity=".3"/>
        </svg>
        <span>fibril<em style="color:var(--accent);font-style:normal">·</em>admin</span>
      </div>
      <h1>Sign in</h1>
      <p>Use your admin credentials to open the dashboard.</p>
      {% if let Some(message) = error %}
        <div class="settings-message" data-kind="error">{{ message }}</div>
      {% endif %}
      <form method="post" action="/login" class="login-form">
        <label>
          Username
          <input name="username" autocomplete="username" required>
        </label>
        <label>
          Password
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="btn btn-primary" type="submit">Sign in</button>
      </form>
    </section>
  </main>
  <script>
    (() => {
      const stored = window.localStorage.getItem("fibril-admin-theme");
      const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
      document.documentElement.dataset.theme = stored || (prefersLight ? "light" : "dark");
      const flavor = window.localStorage.getItem("fibril-admin-flavor");
      if (flavor) document.documentElement.dataset.flavor = flavor;
    })();
  </script>
</body>
</html>
