{% extends "layout.html" %}
{% block content %}
<div class="page-head-row">
  <h4 class="metrics-header">Queues</h4>
  <button class="btn" id="create-toggle" type="button">Declare queue</button>
</div>

<div class="queue-create-panel" id="create-panel" hidden>
  <div class="queue-create-fields">
    <input id="create.topic" placeholder="topic" />
    <input id="create.group" placeholder="group (optional)" />
    <label>partitions
      <input id="create.partitions" type="number" min="1" value="1" />
    </label>
    <select id="create.dlq">
      <option value="">No dead-letter</option>
      <option value="discard">Discard</option>
      <option value="global">Global DLQ</option>
      <option value="custom">Custom DLQ</option>
    </select>
    <input id="create.dlq_topic" placeholder="DLQ topic" style="display:none" />
    <input id="create.dlq_group" placeholder="DLQ group (optional)" style="display:none" />
    <input id="create.max_retries" type="number" min="0" placeholder="max retries (optional)" />
    <button id="create.submit" type="button">Create</button>
    <span id="create-message" class="op-message"></span>
  </div>
</div>

<div class="queue-controls">
  <input id="queue-search" type="search" placeholder="filter by topic or group" />
  <label><input id="queue-hide-inactive" type="checkbox" /> hide inactive</label>
</div>

<div id="queues"></div>

<div class="spark-pop" id="spark-pop" hidden>
  <div class="spark-pop-head">
    <span class="mono" id="spark-pop-title"></span>
    <span class="micro">depth · 30 min</span>
    <button class="close" id="spark-pop-close" type="button" aria-label="Close">×</button>
  </div>
  <svg id="spark-pop-chart" class="chart" style="height:100px" width="300" height="100"></svg>
  <div class="spark-pop-vals">
    <div>depth now<b id="spark-pop-depth">--</b></div>
    <div>leased now<b id="spark-pop-leased">--</b></div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/admin.js"></script>
<script>
function inspectHref(item) {
  const params = new URLSearchParams();
  params.set("topic", item.topic);
  if (item.group) params.set("group", item.group);
  params.set("from", String(item.state?.settled_until ?? 0));
  return `/admin/messages?${params}`;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

// Topics whose per-partition rows are expanded. Module-level so the state
// survives the 2s refresh that re-renders the table.
const expandedTopics = new Set();
function topicKeyOf(group, topic) {
  return `${group}\u0000${topic}`;
}

function formatDuration(ms) {
  if (ms === null || ms === undefined) return "N/A";
  if (ms < 1000) return `${ms}ms`;
  const seconds = Math.floor(ms / 1000);
  if (seconds < 60) return `${seconds}s`;
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m ${seconds % 60}s`;
  const hours = Math.floor(minutes / 60);
  return `${hours}h ${minutes % 60}m`;
}

function formatTime(ms) {
  if (!ms) return "N/A";
  return new Intl.DateTimeFormat(undefined, {
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
  }).format(new Date(ms));
}

function formatLastLeaseActivity(activity) {
  if (!activity) return "Not seen this run";
  return formatTime(activity.last_active_ms);
}

function formatQueueStateValue(item, value) {
  return item.materialized ? String(value ?? 0) : "-";
}

function humanizeSnake(value) {
  return String(value || "")
    .replace(/_/g, " ")
    .replace(/\b\w/g, char => char.toUpperCase());
}

function cleanupOutcomeLabel(observation) {
  if (!observation) return "No cleanup yet";
  return `${humanizeSnake(observation.kind)}: ${humanizeSnake(observation.outcome)}`;
}

function loadStateLabel(item, activity) {
  if (item.evicting) return "Unloading";
  if (item.materialized) return "Loaded";
  if ((activity?.active_publishers ?? 0) > 0 || (activity?.active_subscribers ?? 0) > 0) {
    return "Active lease";
  }
  if (
    activity?.last_eviction_attempt?.kind === "storage" &&
    activity?.last_eviction_attempt?.outcome === "evicted"
  ) return "Unloaded after idle";
  if (item.exists_on_disk) return "On disk";
  return "Not loaded";
}

function rowClass(item, activity) {
  if (item.evicting) return "queue-row queue-row-unloading";
  if ((activity?.active_publishers ?? 0) > 0 || (activity?.active_subscribers ?? 0) > 0) return "queue-row queue-row-active";
  if (!item.materialized) return "queue-row queue-row-unloaded";
  return "queue-row";
}

function stateClass(item, activity) {
  if (item.evicting) return "queue-state-pill queue-state-unloading";
  if (item.materialized) return "queue-state-pill queue-state-loaded";
  if ((activity?.active_publishers ?? 0) > 0 || (activity?.active_subscribers ?? 0) > 0) return "queue-state-pill queue-state-active";
  return "queue-state-pill queue-state-unloaded";
}

// Per-queue depth series from the broker's in-memory history, keyed
// "topic group" (raw group, empty when none). Feeds the row sparklines.
let depthSeries = new Map();

// Broker activity is tracked per queue (topic + group), not per partition.
function activityKey(topic, group) {
  return `${topic}\u0000${group || ""}`;
}

// Color the depth number by where it is heading: a growing backlog warns, a
// draining one reassures, and an empty or flat queue stays neutral.
function depthTone(series, ready) {
  const depths = series?.depths || [];
  if (depths.length < 4 || ready === 0) return "";
  const recent = depths[depths.length - 1];
  const before = depths[Math.max(0, depths.length - 6)];
  if (recent > before * 1.05 + 1) return "v-warn";
  if (recent < before * 0.95 - 1) return "v-ok";
  return "";
}

function render(bundle) {
  const data = bundle.queues_debug || {};
  const history = bundle.history || { queues: [] };
  depthSeries = new Map(
    (history.queues || []).map((entry) => [
      `${entry.topic} ${entry.group || ""}`,
      {
        depths: entry.samples.map((point) => point.depth),
        leased: entry.samples.map((point) => point.leased),
      },
    ]),
  );
  const container = document.getElementById("queues");
  const activityByQueue = new Map((data.broker_activity || [])
    .map(item => [activityKey(item.topic, item.group), item]));
  // /admin/api/queues_debug returns work queues only (the server filters streams,
  // which reuse the queue handle, into /admin/api/streams_debug).
  const queues = data.queues || [];
  const activitySummary = data.broker_activity_summary || {};
  const cleanupMetrics = data.broker_cleanup_metrics || {};
  const loaded = queues.filter(item => item.materialized).length;
  const unloading = queues.filter(item => item.evicting).length;
  const tracked = activitySummary.tracked_queue_count ?? data.broker_activity?.length ?? 0;

  const num = (v) => (typeof v === "number" ? v : 0);

  // Queue-table filters (summary cards above stay full counts).
  const search = (document.getElementById("queue-search")?.value || "").trim().toLowerCase();
  const hideInactive = document.getElementById("queue-hide-inactive")?.checked ?? false;
  const isActive = (item) => {
    const a = activityByQueue.get(activityKey(item.topic, item.group));
    return (a?.active_publishers ?? 0) > 0 || (a?.active_subscribers ?? 0) > 0;
  };
  const visibleQueues = queues.filter((item) => {
    if (hideInactive && !isActive(item)) return false;
    if (search && !`${item.topic || ""} ${item.group || ""}`.toLowerCase().includes(search)) {
      return false;
    }
    return true;
  });

  const byGroup = {};
  for (const item of visibleQueues) {
    const group = item.group || "default";
    (byGroup[group] ||= {});
    (byGroup[group][item.topic] ||= []).push(item);
  }

  const summary = `
    <div class="stat-strip">
      <span><b>${queues.length}</b> indexed</span>
      <span><b class="v-accent">${loaded}</b> loaded</span>
      <span><b class="${unloading > 0 ? "v-warn" : "v-dim"}">${unloading}</b> unloading</span>
      <span><b>${tracked}</b> seen by broker</span>
      <span><b class="v-active">${activitySummary.active_queue_count ?? 0}</b> active</span>
      <span><b class="v-dim">${activitySummary.idle_queue_count ?? 0}</b> idle</span>
      <span><b>${cleanupMetrics.attempts_total ?? 0}</b> cleanup attempts</span>
      <span><b>${cleanupMetrics.storage_evicted_total ?? 0}</b> unloaded by cleanup</span>
    </div>
  `;

  const replication = data.replication_summary || {};
  const followers = data.replication_followers || [];
  let replicationHtml = "";
  if ((replication.follower_worker_count ?? 0) > 0 || followers.length > 0) {
    const repCards = `
      <div class="queue-summary-grid">
        <div class="queue-summary-card"><span>Follower workers</span><strong>${replication.follower_worker_count ?? 0}</strong></div>
        <div class="queue-summary-card"><span>Caught up</span><strong>${replication.caught_up_count ?? 0}</strong></div>
        <div class="queue-summary-card"><span>Pending retry</span><strong>${replication.pending_retry_count ?? 0}</strong></div>
        <div class="queue-summary-card"><span>Checkpoint required</span><strong>${replication.checkpoint_required_count ?? 0}</strong></div>
      </div>
    `;
    const repRows = followers
      .slice()
      .sort((a, b) => a.topic.localeCompare(b.topic) || (a.partition - b.partition))
      .map(f => {
        const status = f.state?.status?.status || "unknown";
        return `
        <tr>
          <td title="${escapeHtml(f.topic)}">${escapeHtml(f.topic)}</td>
          <td class="text-right">${f.partition ?? 0}</td>
          <td>${escapeHtml(f.group || "default")}</td>
          <td><span class="queue-state-pill replica-status-${escapeHtml(status)}">${escapeHtml(humanizeSnake(status))}</span></td>
          <td class="text-right">${f.state?.message_next_offset ?? 0}</td>
          <td class="text-right">${f.state?.event_next_offset ?? 0}</td>
          <td>${escapeHtml(formatTime(f.state?.last_progress))}</td>
          <td class="text-right">${f.state?.next_delay_ms ?? 0}ms</td>
          <td>${f.busy ? "yes" : "no"}</td>
        </tr>`;
      }).join('');
    replicationHtml = `
      <h5 class="metrics-header queue-group-heading" style="margin-top: 26px">Replication status - copies this broker follows</h5>
      <p class="queue-group-note">This broker holds follower copies of these queues and pulls changes
        from their owners. Status says how far each copy has caught up; it is
        not a queue this broker serves.</p>
      ${repCards}
      <div class="queue-table-wrap">
        <table class="table table-compact narrow metric-table queue-table">
          <tr>
            <th>Topic</th>
            <th class="text-right">Partition</th>
            <th>Group</th>
            <th>Status</th>
            <th class="text-right">Message next</th>
            <th class="text-right">Event next</th>
            <th>Last progress</th>
            <th class="text-right">Next retry in</th>
            <th>Busy</th>
          </tr>
          ${repRows}
        </table>
      </div>
    `;
  }

  const html = Object.entries(byGroup)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([group, topics]) => {
      const topicEntries = Object.entries(topics).sort(([a], [b]) => a.localeCompare(b));
      const topicRows = topicEntries.map(([topic, parts]) => {
        parts.sort((a, b) => num(a.partition) - num(b.partition));
        const open = expandedTopics.has(topicKeyOf(group, topic));
        const loaded = parts.filter(p => p.materialized).length;
        const act = activityByQueue.get(activityKey(topic, parts[0]?.group));
        const sumState = (field) => parts.filter(p => p.materialized).reduce((acc, p) => acc + num(p.state[field]), 0);
        const dlqItem = parts.find(p => p.materialized);
        const policyChipClass = (kind) =>
          kind === "discard" ? "chip-warn" : kind === "custom" ? "chip-group" : "chip-plain";
        const dlqChips = (state) => {
          if (!state) return '<span class="v-dim">—</span>';
          const kind = dlqPolicyKind(state.dlq_policy);
          return `<span class="${policyChipClass(kind)}">dlq ${escapeHtml(kind)}</span>`
            + (state.dlq_max_retries != null ? ` <span class="chip-plain">retry ${escapeHtml(String(state.dlq_max_retries))}</span>` : "");
        };
        const aggReady = sumState("ready_count");
        const aggSubs = num(act?.active_subscribers);
        const subsClass = aggSubs > 0 ? "v-ok" : (aggReady > 0 ? "v-warn" : "v-dim");
        const dataAttrs = `data-group="${escapeHtml(group)}" data-topic="${escapeHtml(topic)}"`;
        const agg = `
          <tr class="queue-row queue-agg-row" ${dataAttrs} data-partitions="${parts.length}" style="cursor:pointer">
            <td class="queue-topic-cell" title="${escapeHtml(topic)}"><span class="queue-caret">${open ? "▼" : "▶"}</span> ${escapeHtml(topic)}</td>
            <td><span class="chip-plain">${loaded}/${parts.length} loaded</span></td>
            <td class="text-right ${depthTone(depthSeries.get(`${topic} ${parts[0]?.group || ""}`), aggReady)}" title="${aggReady}">${fmtCompact(aggReady)}</td>
            <td class="queue-spark-cell"><svg class="queue-spark" data-key="${escapeHtml(`${topic} ${parts[0]?.group || ""}`)}" width="90" height="22" aria-label="Depth over the last 30 minutes"></svg></td>
            <td class="text-right v-active">${fmtCompact(sumState("inflight_count"))}</td>
            <td class="text-right ${num(act?.active_publishers) > 0 ? "v-active" : "v-dim"}">${num(act?.active_publishers)}</td>
            <td class="text-right ${subsClass}">${aggSubs}</td>
            <td class="text-right v-dim">—</td>
            <td>${dlqChips(dlqItem?.state)}</td>
            <td class="queue-actions"><a class="queue-messages-link" href="/admin/queue?${new URLSearchParams({ topic, ...(parts[0]?.group ? { group: parts[0].group } : {}) })}">Detail</a> <button type="button" class="queue-delete-btn" ${dataAttrs} data-partitions="${parts.length}">Delete</button></td>
          </tr>`;
        const childRows = parts.map(item => {
          return `
          <tr class="${rowClass(item, act)} queue-part-row" ${dataAttrs}${open ? "" : ' style="display:none"'}>
            <td class="queue-part-cell">partition ${num(item.partition)}</td>
            <td><span class="${stateClass(item, act)}">${escapeHtml(loadStateLabel(item, act))}</span></td>
            <td class="text-right">${formatQueueStateValue(item, item.state.ready_count)}</td>
            <td class="v-dim">—</td>
            <td class="text-right">${formatQueueStateValue(item, item.state.inflight_count)}</td>
            <td class="text-right v-dim">—</td>
            <td class="text-right v-dim">—</td>
            <td class="text-right">${formatQueueStateValue(item, item.state.settled_until)}</td>
            <td class="v-dim">—</td>
            <td><a class="queue-messages-link" href="${inspectHref(item)}" title="Inspect messages">Inspect</a></td>
          </tr>`;
        }).join("");
        return agg + childRows;
      }).join("");

      const partCount = topicEntries.reduce((acc, [, parts]) => acc + parts.length, 0);
      return `
        <div class="queue-table-wrap">
          <div class="card-head">
            <span class="micro">group</span>
            <span class="chip-group">${escapeHtml(group)}</span>
            <span class="queue-group-note">${topicEntries.length} topic(s) · ${partCount} partition(s) — click a topic to expand its partitions</span>
          </div>
          <table class="table table-compact narrow metric-table queue-table">
            <tr>
              <th>Topic / partition</th>
              <th>State</th>
              <th class="text-right">Depth</th>
              <th>Trend — 30 min</th>
              <th class="text-right">Leased</th>
              <th class="text-right">Publishers</th>
              <th class="text-right">Consumers</th>
              <th class="text-right">Settled until</th>
              <th>Policy</th>
              <th>Actions</th>
            </tr>
            ${topicRows}
          </table>
        </div>
      `;
    }).join('');

  container.innerHTML = summary + html + replicationHtml;
  container.querySelectorAll(".queue-spark").forEach((svg) => {
    renderSparkline(svg, depthSeries.get(svg.dataset.key)?.depths ?? [], "var(--accent)");
  });
}

const sparkPop = document.getElementById("spark-pop");
function hideSparkPop() {
  sparkPop.hidden = true;
}
document.getElementById("spark-pop-close").addEventListener("click", hideSparkPop);
document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") hideSparkPop();
});
document.addEventListener("click", (event) => {
  if (!sparkPop.hidden && !sparkPop.contains(event.target) && !event.target.closest(".queue-spark")) {
    hideSparkPop();
  }
});

function openSparkPop(svg) {
  const key = svg.dataset.key || "";
  const series = depthSeries.get(key);
  const depths = series?.depths ?? [];
  const leased = series?.leased ?? [];
  document.getElementById("spark-pop-title").textContent = key.trim().replace(" ", " · ");
  renderChart(document.getElementById("spark-pop-chart"), [
    { values: depths, color: "var(--accent)", fill: true },
    { values: leased, color: "var(--active)" },
  ]);
  document.getElementById("spark-pop-depth").textContent =
    depths.length ? fmtCount(depths[depths.length - 1]) : "--";
  document.getElementById("spark-pop-leased").textContent =
    leased.length ? fmtCount(leased[leased.length - 1]) : "--";
  const rect = svg.getBoundingClientRect();
  sparkPop.style.left = Math.max(8, Math.min(window.innerWidth - 346, rect.left - 60)) + "px";
  sparkPop.style.top = Math.min(window.innerHeight - 210, rect.bottom + 8) + "px";
  sparkPop.hidden = false;
}

document.getElementById("queues").addEventListener("click", (event) => {
  const spark = event.target.closest(".queue-spark");
  if (spark) {
    event.stopPropagation();
    openSparkPop(spark);
    return;
  }
  // The Delete button lives inside the aggregate row - handle it separately so a
  // click does not also toggle the partition expansion.
  const deleteBtn = event.target.closest(".queue-delete-btn");
  if (deleteBtn) {
    event.stopPropagation();
    deleteQueue(deleteBtn);
    return;
  }
  const row = event.target.closest(".queue-agg-row");
  if (!row) return;
  const g = row.dataset.group;
  const t = row.dataset.topic;
  const tk = topicKeyOf(g, t);
  const open = !expandedTopics.has(tk);
  if (open) expandedTopics.add(tk); else expandedTopics.delete(tk);
  const caret = row.querySelector(".queue-caret");
  if (caret) caret.textContent = open ? "▼" : "▶";
  document.querySelectorAll(".queue-part-row").forEach((r) => {
    if (r.dataset.group === g && r.dataset.topic === t) r.style.display = open ? "" : "none";
  });
});

// ---- create queue ----
function setCreateMessage(text, kind) {
  const node = document.getElementById("create-message");
  node.textContent = text;
  node.dataset.kind = kind || "info";
}

document.getElementById("create.dlq").addEventListener("change", (event) => {
  const custom = event.target.value === "custom";
  document.getElementById("create.dlq_topic").style.display = custom ? "" : "none";
  document.getElementById("create.dlq_group").style.display = custom ? "" : "none";
});

async function submitCreateQueue() {
  const topic = document.getElementById("create.topic").value.trim();
  const group = document.getElementById("create.group").value.trim();
  const count = Number(document.getElementById("create.partitions").value) || 1;
  const dlq = document.getElementById("create.dlq").value;
  const maxRetriesRaw = document.getElementById("create.max_retries").value.trim();
  if (!topic) return setCreateMessage("Enter a topic.", "warning");
  if (!(count >= 1)) return setCreateMessage("Partition count must be at least 1.", "warning");

  const body = { topic, group: group || null, partition_count: count };
  if (dlq) {
    body.policy = dlq;
    if (dlq === "custom") {
      const dlqTopic = document.getElementById("create.dlq_topic").value.trim();
      if (!dlqTopic) return setCreateMessage("Custom DLQ needs a target topic.", "warning");
      const dlqGroup = document.getElementById("create.dlq_group").value.trim();
      body.target = { topic: dlqTopic, group: dlqGroup || null };
    }
  }
  if (maxRetriesRaw !== "") body.max_retries = Number(maxRetriesRaw);

  const { ok, data } = await apiPost("/admin/api/queues", body);
  if (ok) {
    setCreateMessage(`Created "${topic}" with ${data?.partition_count ?? count} partition(s).`, "info");
    document.getElementById("create.topic").value = "";
    refresh();
  } else {
    setCreateMessage(`Failed: ${data?.message || data?.error || "request failed"}`, "warning");
  }
}

document.getElementById("create.submit").addEventListener("click", submitCreateQueue);
document.getElementById("create-toggle").addEventListener("click", () => {
  const panel = document.getElementById("create-panel");
  panel.hidden = !panel.hidden;
  if (!panel.hidden) document.getElementById("create.topic").focus();
});

// ---- delete queue ----
async function deleteQueue(btn) {
  const topic = btn.dataset.topic;
  const group = btn.dataset.group;
  const partitions = Number(btn.dataset.partitions) || 1;
  const label = group && group !== "default" ? `${topic} (group ${group})` : topic;
  if (!confirm(`Delete queue "${label}" and all ${partitions} partition(s)? This drops the messages and on-disk storage and cannot be undone.`)) {
    return;
  }
  const body = {
    topic,
    group: group && group !== "default" ? group : null,
    partition_count: partitions,
  };
  const { ok, data } = await apiPost("/admin/api/queues/delete", body);
  if (ok) {
    toast(`Deleted "${topic}" (${data?.partition_count ?? partitions} partition(s)).`);
    refresh();
  } else {
    toast(`Delete failed: ${data?.message || data?.error || "request failed"}`);
  }
}

// Fetch-based refresh: re-renders on filter edits, refreshes after actions,
// and is the polling fallback when the event stream is out.
async function refresh() {
  const [queues_debug, history] = await Promise.all([
    api('/admin/api/queues_debug'),
    api('/admin/api/history').catch(() => ({ queues: [] })),
  ]);
  render({ queues_debug, history });
}

// Filters live in the URL (?q=, ?hide=inactive) so a filtered view survives
// reload and can be shared. Re-render immediately on change (the push tick
// also re-applies them).
wireUrlFilter(document.getElementById("queue-search"), "q", refresh);
const hideInactiveBox = document.getElementById("queue-hide-inactive");
hideInactiveBox.checked = urlParamGet("hide") === "inactive";
hideInactiveBox.addEventListener("change", () => {
  urlParamSet("hide", hideInactiveBox.checked ? "inactive" : "");
  refresh();
});

// Existing groups and topics suggest themselves in the declare panel.
wireCatalogDatalist(document.getElementById("create.group"), (q) => q.group);
wireCatalogDatalist(document.getElementById("create.dlq_topic"), (q) => q.topic);
wireCatalogDatalist(document.getElementById("create.dlq_group"), (q) => q.group);

liveData(["queues_debug", "history"], render, refresh);
</script>
{% endblock %}
