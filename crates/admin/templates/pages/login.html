<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{title}}</title>
  <link rel="stylesheet" href="/static/vendor/clarity/global.min.css">
  <link rel="stylesheet" href="/static/vendor/clarity/clr-ui.min.css">
  <link rel="stylesheet" href="/static/vendor/clarity/theme.dark.min.css">
  <link rel="stylesheet" href="/static/vendor/clarity/clarity-icons.min.css">
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body cds-theme="dark" class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <div class="login-brand">
        <clr-icon shape="eye"></clr-icon>
        <span>Fibril Admin</span>
      </div>
      <h1>Sign in</h1>
      <p>Use your admin credentials to open the dashboard.</p>
      {% if let Some(message) = error %}
        <div class="settings-message" data-kind="error">{{ message }}</div>
      {% endif %}
      <form method="post" action="/login" class="login-form">
        <label>
          Username
          <input name="username" autocomplete="username" required>
        </label>
        <label>
          Password
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="btn btn-primary" type="submit">Sign in</button>
      </form>
    </section>
  </main>
  <script>
    document.body.setAttribute("cds-theme",
      window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
    );
  </script>
</body>
</html>
