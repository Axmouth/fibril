{% extends "layout.html" %}
{% block content %}
<h4 class="metrics-header">Queues</h4>

<div id="queues"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/admin.js"></script>
<script>
function inspectHref(item) {
  const params = new URLSearchParams();
  params.set("topic", item.topic);
  if (item.group) params.set("group", item.group);
  params.set("from", String(item.state?.settled_until ?? 0));
  return `/admin/messages?${params}`;
}

async function refresh() {
  const data = await api('/admin/api/queues_debug');
  const container = document.getElementById("queues");

  const grouped = {};
  for (const item of data.queues || []) {
    const group = item.group || "default";
    if (!grouped[group]) grouped[group] = [];
    grouped[group].push(item);
  }

  const html = Object.entries(grouped)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([group, items]) => {
      const rows = items
        .sort((a, b) => a.topic.localeCompare(b.topic))
        .map(item => `
          <tr>
            <td>${item.topic}</td>
            <td class="text-right">${item.state.ready_count}</td>
            <td class="text-right">${item.state.inflight_count}</td>
            <td class="text-right">${item.state.settled_until}</td>
            <td><a href="${inspectHref(item)}">Inspect messages</a></td>
          </tr>
        `).join('');

      return `
        <h5 class="metrics-header" style="margin-top: 1rem;">Group: ${group}</h5>
        <table class="table table-compact narrow metric-table">
          <tr>
            <th>Topic</th>
            <th class="text-right">Ready</th>
            <th class="text-right">In-flight</th>
            <th class="text-right">Settled until</th>
            <th>Messages</th>
          </tr>
          ${rows}
        </table>
      `;
    }).join('');

  container.innerHTML = html;
}

setInterval(refresh, 2000);
refresh();
</script>
{% endblock %}
