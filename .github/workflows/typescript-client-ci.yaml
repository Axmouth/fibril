name: TypeScript client CI

on:
  workflow_call:
  pull_request:
    paths:
      - ".github/workflows/typescript-client-ci.yaml"
      - "clients/typescript/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/typescript-client-ci.yaml"
      - "clients/typescript/**"

permissions:
  contents: read

jobs:
  test:
    name: TypeScript client tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: clients/typescript

      - name: Run tests
        run: npm test
        working-directory: clients/typescript
