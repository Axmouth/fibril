<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <script>
    (() => {
      const storageKey = "fibril-admin-theme";
      const stored = window.localStorage.getItem(storageKey);
      const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
      document.documentElement.dataset.theme = stored || (prefersLight ? "light" : "dark");
    })();
  </script>
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body class="admin-body">
  <div class="main-container">
    <header class="site-header">
      <nav class="admin-nav" aria-label="Admin navigation">
        <a class="brand" href="/">
          <span class="mark" aria-hidden="true">
            <span></span>
            <span></span>
          </span>
          <span>fibril admin</span>
        </a>
        <div class="nav-links">
          <a class="nav-link {% if page == "dashboard" %}active{% endif %}" href="/">Dashboard</a>
          <a class="nav-link {% if page == "connections" %}active{% endif %}" href="/admin/connections">Connections</a>
          <a class="nav-link {% if page == "subscriptions" %}active{% endif %}" href="/admin/subscriptions">Subscriptions</a>
          <a class="nav-link {% if page == "queues" %}active{% endif %}" href="/admin/queues">Queues</a>
          <a class="nav-link {% if page == "diagnostics" %}active{% endif %}" href="/admin/diagnostics">Diagnostics</a>
          <a class="nav-link {% if page == "topology" %}active{% endif %}" href="/admin/topology">Topology</a>
          <a class="nav-link {% if page == "settings" %}active{% endif %}" href="/admin/settings">Settings</a>
        </div>
        <div class="nav-actions">
          {% if auth_enabled %}
            <a href="/logout" class="icon-link" aria-label="Log out" title="Log out">
              <span class="icon icon-logout" aria-hidden="true"></span>
              <span>Logout</span>
            </a>
          {% else %}
            <span class="admin-auth-pill">Auth disabled</span>
          {% endif %}
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Use light theme"></button>
        </div>
      </nav>
    </header>
    <div class="content-container">
      <div class="content-area">
        {% block content %}{% endblock %}
      </div>
    </div>
    <footer class="footer">
      <span class="copyright">
        Fibril © 2025 - fast · deterministic · predictably boring
      </span>
      ·
      <a href="https://github.com/axmouth/fibril" target="_blank">
        <span class="icon icon-github" aria-hidden="true"></span> GitHub
      </a>
      ·
      <a href="https://axmouth.dev" target="_blank">
        <span class="icon icon-user" aria-hidden="true"></span> Author
      </a>
    </footer>

  </div>
  <script>
    (() => {
      const root = document.documentElement;
      const toggle = document.querySelector("[data-theme-toggle]");
      const storageKey = "fibril-admin-theme";
      let current = root.dataset.theme || "dark";

      function applyTheme(theme) {
        current = theme;
        root.dataset.theme = theme;
        if (!toggle) return;
        toggle.textContent = theme === "light" ? "☀" : "☾";
        toggle.setAttribute("aria-label", theme === "light" ? "Use dark theme" : "Use light theme");
      }

      applyTheme(current);
      toggle?.addEventListener("click", () => {
        const next = current === "light" ? "dark" : "light";
        window.localStorage.setItem(storageKey, next);
        root.classList.add("theme-transition");
        applyTheme(next);
        window.setTimeout(() => root.classList.remove("theme-transition"), 260);
      });
    })();
  </script>
</body>
</html>
