name: Verify website

on:
  workflow_call:
  pull_request:
    paths:
      - ".github/workflows/website-ci.yaml"
      - "compose.website.deploy.yaml"
      - "website/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Verify static site
        run: npm run verify
        working-directory: website
        env:
          ASTRO_TELEMETRY_DISABLED: "1"

      - name: Validate deploy Compose file
        run: docker compose -f compose.website.deploy.yaml config --quiet
        env:
          SITE_IMAGE: ghcr.io/axmouth/fibril/site:test
          SITE_DOMAIN: fibril.sh

      - name: Check Traefik host rule
        run: |
          rule="$(docker compose -f compose.website.deploy.yaml config | sed -n 's/.*traefik.http.routers.fibril-site.rule: //p')"
          test "$rule" = 'Host(`fibril.sh`) || Host(`www.fibril.sh`)'
        env:
          SITE_IMAGE: ghcr.io/axmouth/fibril/site:test
          SITE_DOMAIN: fibril.sh
