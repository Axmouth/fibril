{% extends "layout.html" %}
{% block content %}
<main class="messages-panel">
  <h4>Messages</h4>
  <p class="message-warning-note">
    Inspect persisted queue messages for operations and debugging. This reads queue state and message data on demand; do not use it as a live polling view.
  </p>

  <section class="settings-section">
    <form id="message-inspection-form" class="message-inspection-form">
      <label class="settings-field">
        <span class="settings-label">Topic</span>
        <span class="settings-help">Queue topic to inspect.</span>
        <input class="clr-input" id="message-topic" required placeholder="orders.created">
      </label>

      <label class="settings-field">
        <span class="settings-label">Group</span>
        <span class="settings-help">Optional queue group. Leave blank for the default group.</span>
        <input class="clr-input" id="message-group" placeholder="default">
      </label>

      <label class="settings-field">
        <span class="settings-label">From offset</span>
        <span class="settings-help">First offset to inspect.</span>
        <input class="clr-input" id="message-from" type="number" min="0" step="1" value="0">
      </label>

      <label class="settings-field">
        <span class="settings-label">Limit</span>
        <span class="settings-help">Maximum rows to request. The server applies a hard cap.</span>
        <input class="clr-input" id="message-limit" type="number" min="1" max="5000" step="1" value="50">
      </label>

      <label class="checkbox-label">
        <input id="message-include-settled" type="checkbox">
        <span>
          <span class="settings-label">Include settled offsets</span>
          <span class="settings-help">By default, inspection only shows messages still active in queue state.</span>
        </span>
      </label>

      <label class="checkbox-label">
        <input id="message-include-payload" type="checkbox">
        <span>
          <span class="settings-label">Include payload preview</span>
          <span class="settings-help">Payload previews are base64 from the persisted message log and may be truncated.</span>
        </span>
      </label>

      <label class="settings-field" id="payload-limit-row" hidden>
        <span class="settings-label">Payload preview bytes</span>
        <span class="settings-help">Maximum bytes returned per message preview.</span>
        <input class="clr-input" id="message-payload-limit" type="number" min="1" max="1048576" step="1" value="4096">
      </label>

      <div class="settings-actions">
        <button class="btn btn-primary" type="submit">Load messages</button>
        <button class="btn" type="button" id="message-previous" disabled>Previous page</button>
        <button class="btn" type="button" id="message-next" disabled>Next page</button>
        <button class="btn btn-warning" type="button" id="message-replay" disabled>Replay selected to source</button>
      </div>
    </form>
  </section>

  <div id="message-inspection-message" class="settings-message"></div>
  <div id="message-results" class="message-results"></div>

  <div id="payload-modal" class="message-modal" hidden>
    <div class="message-modal-card" role="dialog" aria-modal="true" aria-labelledby="payload-modal-title">
      <div class="message-modal-header">
        <h5 id="payload-modal-title">Payload preview</h5>
        <button class="btn btn-sm" type="button" id="payload-modal-close">Close</button>
      </div>
      <dl class="message-modal-meta">
        <div><dt>Offset</dt><dd id="payload-modal-offset"></dd></div>
        <div><dt>Bytes</dt><dd id="payload-modal-bytes"></dd></div>
        <div><dt>Status</dt><dd id="payload-modal-status"></dd></div>
      </dl>
      <pre id="payload-modal-body"></pre>
    </div>
  </div>
</main>

<script src="/static/js/api.js"></script>
<script>
const form = document.getElementById("message-inspection-form");
const results = document.getElementById("message-results");
const message = document.getElementById("message-inspection-message");
const previousButton = document.getElementById("message-previous");
const nextButton = document.getElementById("message-next");
const replayButton = document.getElementById("message-replay");
const includePayload = document.getElementById("message-include-payload");
const payloadLimitRow = document.getElementById("payload-limit-row");
const payloadModal = document.getElementById("payload-modal");
const payloadModalClose = document.getElementById("payload-modal-close");

const OLD_LIMIT_WARNING_THRESHOLD = 500;
const OLD_PAYLOAD_WARNING_THRESHOLD = 65536;

let currentFrom = 0;
let nextOffsetHint = null;
let previousOffsets = [];
let lastItems = new Map();

function field(id) {
  return document.getElementById(id);
}

function setMessage(kind, text) {
  message.dataset.kind = kind;
  message.textContent = text;
}

function clearMessage() {
  message.removeAttribute("data-kind");
  message.textContent = "";
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function decodePayloadPreview(payloadBase64) {
  if (!payloadBase64) return "";
  const bytes = Uint8Array.from(atob(payloadBase64), char => char.charCodeAt(0));
  try {
    return new TextDecoder("utf-8", { fatal: true }).decode(bytes);
  } catch {
    return payloadBase64;
  }
}

function optionalNumber(id) {
  const raw = field(id).value.trim();
  return raw === "" ? null : Number(raw);
}

function buildQuery(fromOverride = null) {
  const topic = field("message-topic").value.trim();
  if (!topic) throw new Error("Topic is required.");

  const params = new URLSearchParams();
  params.set("topic", topic);
  const group = normalizedGroupValue("message-group");
  if (group) params.set("group", group);
  params.set("from", String(fromOverride ?? optionalNumber("message-from") ?? 0));

  const limit = optionalNumber("message-limit");
  if (limit !== null) params.set("limit", String(limit));
  if (field("message-include-settled").checked) params.set("include_settled", "true");
  if (field("message-include-payload").checked) {
    params.set("include_payload", "true");
    const payloadLimit = optionalNumber("message-payload-limit");
    if (payloadLimit !== null) params.set("payload_limit_bytes", String(payloadLimit));
  }

  return params;
}

function confirmLargeInspection(query) {
  const limit = Number(query.get("limit") || "50");
  const payloadLimit = Number(query.get("payload_limit_bytes") || "4096");
  const reasons = [];
  if (limit > OLD_LIMIT_WARNING_THRESHOLD) {
    reasons.push(`page size ${limit}`);
  }
  if (query.get("include_payload") === "true" && payloadLimit > OLD_PAYLOAD_WARNING_THRESHOLD) {
    reasons.push(`payload preview ${payloadLimit} bytes`);
  }
  if (reasons.length === 0) return true;
  return window.confirm(
    `Large message inspection requested (${reasons.join(", ")}). This can read a lot of persisted data. Continue?`
  );
}

function normalizedGroupValue(id) {
  const value = field(id).value.trim();
  return value === "" || value === "default" ? null : value;
}

function renderHeaders(headers) {
  if (!headers) return '<span class="message-muted">none</span>';

  const parts = [];
  if (headers.content_type) {
    parts.push(["content_type", contentTypeLabel(headers.content_type)]);
  }
  if (headers.published !== undefined && headers.published !== null) {
    parts.push(["published", headers.published]);
  }
  if (headers.publish_received !== undefined && headers.publish_received !== null) {
    parts.push(["publish_received", headers.publish_received]);
  }
  for (const [key, value] of Object.entries(headers.extra || {})) {
    parts.push([key, value]);
  }

  if (parts.length === 0) return '<span class="message-muted">none</span>';
  return parts
    .map(([key, value]) => `<code>${escapeHtml(key)}=${escapeHtml(value)}</code>`)
    .join(" ");
}

function contentTypeLabel(contentType) {
  if (contentType === "MsgPack") return "application/msgpack";
  if (contentType === "Json") return "application/json";
  if (contentType === "Text") return "text/plain; charset=utf-8";
  if (typeof contentType === "string") return contentType;
  if (contentType.MsgPack !== undefined) return "application/msgpack";
  if (contentType.Json !== undefined) return "application/json";
  if (contentType.Text !== undefined) return "text/plain; charset=utf-8";
  if (contentType.Custom !== undefined) return contentType.Custom;
  return JSON.stringify(contentType);
}

function payloadPreviewText(item) {
  if (item.missing_payload) return '<span class="message-bad">missing from log</span>';
  if (!item.payload_base64) return '<span class="message-muted">not requested</span>';
  const preview = decodePayloadPreview(item.payload_base64);
  const suffix = item.payload_truncated ? " (truncated)" : "";
  return `${preview}${suffix}`;
}

function renderPayloadCell(item) {
  if (item.missing_payload) return '<span class="message-bad">missing from log</span>';
  if (!item.payload_base64) return '<span class="message-muted">not requested</span>';
  const preview = payloadPreviewText(item);
  const short = preview.length > 96 ? `${preview.slice(0, 96)}...` : preview;
  const offset = item.state?.offset;
  return `
    <div class="message-payload-cell">
      <code>${escapeHtml(short)}</code>
      <button class="btn btn-sm message-payload-open" type="button" data-offset="${escapeHtml(offset)}">View</button>
    </div>
  `;
}

function renderItems(data) {
  nextOffsetHint = data.next_offset_hint;
  previousButton.disabled = previousOffsets.length === 0;
  nextButton.disabled = nextOffsetHint === null || nextOffsetHint === undefined;
  replayButton.disabled = true;
  lastItems = new Map((data.items || []).map(item => [String(item.state?.offset), item]));

  if (!data.items || data.items.length === 0) {
    results.innerHTML = '<div class="message-empty">No messages matched this request.</div>';
    return;
  }

  const rows = data.items.map(item => {
    const state = item.state || {};
    return `
      <tr>
        <td><input class="message-select" type="checkbox" value="${escapeHtml(state.offset)}" aria-label="select offset ${escapeHtml(state.offset)}"></td>
        <td class="text-right">${escapeHtml(state.offset)}</td>
        <td><span class="message-status message-status-${escapeHtml(state.status)}">${escapeHtml(state.status)}</span></td>
        <td class="text-right">${escapeHtml(state.retry_count ?? 0)}</td>
        <td class="text-right">${escapeHtml(item.payload_len ?? "")}</td>
        <td>${renderHeaders(item.headers)}</td>
        <td>${renderPayloadCell(item)}</td>
      </tr>
    `;
  }).join("");

  results.innerHTML = `
    <table class="table table-compact message-table">
      <tr>
        <th><input id="message-select-all" type="checkbox" aria-label="select all loaded offsets"></th>
        <th class="text-right">Offset</th>
        <th>Status</th>
        <th class="text-right">Retries</th>
        <th class="text-right">Bytes</th>
        <th>Headers</th>
        <th>Payload</th>
      </tr>
      ${rows}
    </table>
  `;

  for (const checkbox of document.querySelectorAll(".message-select")) {
    checkbox.addEventListener("change", updateReplayButton);
  }
  const selectAll = document.getElementById("message-select-all");
  selectAll.addEventListener("change", () => {
    for (const checkbox of document.querySelectorAll(".message-select")) {
      checkbox.checked = selectAll.checked;
    }
    updateReplayButton();
  });
  for (const button of document.querySelectorAll(".message-payload-open")) {
    button.addEventListener("click", () => openPayloadModal(button.dataset.offset));
  }
  updateReplayButton();
}

async function loadMessages(fromOverride = null) {
  clearMessage();
  results.innerHTML = "";
  const query = buildQuery(fromOverride);
  if (!confirmLargeInspection(query)) return false;
  const data = await api(`/admin/api/messages?${query}`);
  currentFrom = Number(query.get("from") || "0");
  renderItems(data);
  setMessage("info", `Loaded ${data.items?.length ?? 0} message row(s).`);
  return true;
}

function selectedOffsets() {
  return Array.from(document.querySelectorAll(".message-select:checked"))
    .map(input => Number(input.value))
    .filter(value => Number.isFinite(value));
}

function updateReplayButton() {
  const selected = selectedOffsets().length;
  replayButton.disabled = selected === 0;
  const selectAll = document.getElementById("message-select-all");
  if (!selectAll) return;
  const checkboxes = Array.from(document.querySelectorAll(".message-select"));
  selectAll.checked = checkboxes.length > 0 && selected === checkboxes.length;
  selectAll.indeterminate = selected > 0 && selected < checkboxes.length;
}

async function replaySelected() {
  const offsets = selectedOffsets();
  if (offsets.length === 0) return;
  if (!window.confirm(`Replay ${offsets.length} selected DLQ offset(s) back to their recorded source queues? The DLQ messages are not removed.`)) {
    return;
  }
  const dlqTopic = field("message-topic").value.trim();
  if (!dlqTopic) throw new Error("Topic is required.");
  const dlqGroup = normalizedGroupValue("message-group");
  const response = await fetch("/admin/api/dlq/replay", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({
      dlq_topic: dlqTopic,
      dlq_group: dlqGroup,
      offsets,
    }),
  });
  if (!response.ok) {
    throw new Error(await response.text() || `Replay failed: HTTP ${response.status}`);
  }
  const report = await response.json();
  const skipped = report.requested - report.replayed;
  setMessage("success", `Replay requested for ${report.requested} offset(s); ${report.replayed} copied back to source; ${skipped} skipped.`);
  renderReplayReport(report);
}

function renderReplayReport(report) {
  if (!report.items || report.items.length === 0) return;
  const rows = report.items.map(item => `
    <tr>
      <td class="text-right">${escapeHtml(item.offset)}</td>
      <td>${escapeHtml(item.outcome)}</td>
      <td>${escapeHtml(item.target_topic ?? "")}</td>
      <td>${escapeHtml(item.target_group ?? "default")}</td>
      <td>${escapeHtml(item.reason ?? "")}</td>
    </tr>
  `).join("");
  results.insertAdjacentHTML("beforeend", `
    <div class="message-replay-report">
      <h5>Replay result</h5>
      <table class="table table-compact">
        <tr><th class="text-right">Offset</th><th>Outcome</th><th>Target topic</th><th>Target group</th><th>Reason</th></tr>
        ${rows}
      </table>
    </div>
  `);
}

function openPayloadModal(offset) {
  const item = lastItems.get(String(offset));
  if (!item) return;
  field("payload-modal-offset").textContent = item.state?.offset ?? "";
  field("payload-modal-bytes").textContent = item.payload_len ?? "";
  field("payload-modal-status").textContent = item.state?.status ?? "";
  field("payload-modal-body").textContent = payloadPreviewText(item);
  payloadModal.hidden = false;
}

function closePayloadModal() {
  payloadModal.hidden = true;
}

form.addEventListener("submit", async event => {
  event.preventDefault();
  try {
    previousOffsets = [];
    await loadMessages();
  } catch (err) {
    setMessage("error", err.message || String(err));
  }
});

previousButton.addEventListener("click", async () => {
  const previous = previousOffsets.pop();
  if (previous === undefined) return;
  field("message-from").value = String(previous);
  try {
    if (!await loadMessages(previous)) {
      previousOffsets.push(previous);
      previousButton.disabled = false;
    }
  } catch (err) {
    previousOffsets.push(previous);
    previousButton.disabled = false;
    setMessage("error", err.message || String(err));
  }
});

nextButton.addEventListener("click", async () => {
  if (nextOffsetHint === null || nextOffsetHint === undefined) return;
  const previous = currentFrom;
  field("message-from").value = String(nextOffsetHint);
  try {
    if (await loadMessages(nextOffsetHint)) {
      previousOffsets.push(previous);
      previousButton.disabled = false;
    }
  } catch (err) {
    setMessage("error", err.message || String(err));
  }
});

replayButton.addEventListener("click", async () => {
  try {
    await replaySelected();
  } catch (err) {
    setMessage("error", err.message || String(err));
  }
});

includePayload.addEventListener("change", event => {
  payloadLimitRow.hidden = !event.target.checked;
});

payloadModalClose.addEventListener("click", closePayloadModal);
payloadModal.addEventListener("click", event => {
  if (event.target === payloadModal) closePayloadModal();
});

function applyInitialQuery() {
  const params = new URLSearchParams(window.location.search);
  field("message-topic").value = params.get("topic") || "";
  field("message-group").value = params.get("group") || "";
  field("message-from").value = params.get("from") || "0";
  field("message-limit").value = params.get("limit") || "50";
  field("message-include-settled").checked = params.get("include_settled") === "true";
  field("message-include-payload").checked = params.get("include_payload") === "true";
  field("message-payload-limit").value = params.get("payload_limit_bytes") || "4096";
  payloadLimitRow.hidden = !field("message-include-payload").checked;
}

applyInitialQuery();
if (field("message-topic").value.trim()) {
  loadMessages().catch(err => setMessage("error", err.message || String(err)));
}
</script>
{% endblock %}
