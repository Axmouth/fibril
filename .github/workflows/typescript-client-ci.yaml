name: TypeScript client CI

on:
  workflow_call:
  pull_request:
    paths:
      - ".github/workflows/typescript-client-ci.yaml"
      - "clients/typescript/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/typescript-client-ci.yaml"
      - "clients/typescript/**"

permissions:
  contents: read

jobs:
  test:
    name: TypeScript client tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: clients/typescript

      - name: Run tests
        run: npm --silent test
        working-directory: clients/typescript

  examples:
    name: Examples against a real broker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: clients/typescript

      # Reuse the published server image instead of building from source: client
      # CI runs against the latest-main broker, which is what client-only changes
      # want and is far faster than a Rust build.
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Start broker container
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/fibril-server:main"
          docker run -d --name fibril-server -p 9876:9876 -p 8081:8081 "$image"

      - name: Wait for broker health
        run: |
          for _ in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:8081/healthz; then
              echo "broker healthy"; exit 0
            fi
            sleep 1
          done
          echo "broker did not become healthy"; docker logs fibril-server; exit 1

      - name: Run examples
        env:
          FIBRIL_EXTERNAL_BROKER: "1"
          FIBRIL_ADDR: "127.0.0.1:9876"
        run: clients/typescript/examples/run-all.sh

      - name: Broker logs
        if: always()
        run: docker logs fibril-server || true

      - name: Stop broker container
        if: always()
        run: docker rm -f fibril-server || true
