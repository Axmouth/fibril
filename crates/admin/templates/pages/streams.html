{% extends "layout.html" %}
{% block content %}
<div class="page-head-row">
  <h4 class="metrics-header">Streams</h4>
  <button class="btn" id="create-toggle" type="button">Declare stream</button>
</div>
<p class="page-desc">
  Fan-out channels: every consumer sees every record. This lists the stream
  partitions this broker is currently hosting, with their position and declared
  durability and retention.
</p>

<div class="queue-create-panel" id="create-panel" hidden>
  <div class="queue-create-fields">
    <input id="create.topic" placeholder="topic" />
    <label>partitions
      <input id="create.partitions" type="number" min="1" value="1" />
    </label>
    <select id="create.durability">
      <option value="durable">Durable</option>
      <option value="speculative">Speculative</option>
      <option value="ephemeral">Ephemeral</option>
    </select>
    <input id="create.max_records" type="number" min="0" placeholder="retain records (optional)" />
    <input id="create.max_bytes" type="number" min="0" placeholder="retain bytes (optional)" />
    <input id="create.max_age_ms" type="number" min="0" placeholder="retain age ms (optional)" />
    <button id="create.submit" type="button">Create</button>
    <span id="create-message" class="op-message"></span>
  </div>
</div>

<div class="queue-controls">
  <input id="stream-search" type="search" placeholder="filter by topic" />
</div>

<div id="streams"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/admin.js"></script>
<script>
function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function retentionLabel(entry) {
  const parts = [];
  if (entry.max_records != null) parts.push(`${entry.max_records} records`);
  if (entry.max_bytes != null) parts.push(`${entry.max_bytes} bytes`);
  if (entry.max_age_ms != null) parts.push(`${entry.max_age_ms}ms`);
  return parts.length ? parts.join(", ") : "unbounded";
}

function humanizeSnake(value) {
  return String(value || "")
    .replace(/_/g, " ")
    .replace(/\b\w/g, char => char.toUpperCase());
}

function formatTime(ms) {
  if (!ms) return "N/A";
  return new Intl.DateTimeFormat(undefined, {
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
  }).format(new Date(ms));
}

async function refresh() {
  const [stats, debug] = await Promise.all([
    api('/admin/api/streams'),
    api('/admin/api/streams_debug'),
  ]);
  const container = document.getElementById("streams");
  const search = (document.getElementById("stream-search")?.value || "").trim().toLowerCase();

  // Merge the hosted-channel stats (head/tail/retention/durability, owner only)
  // with the debug snapshot (role, applied, materialized, incl. follower
  // partitions that host no fan-out channel) keyed by topic:partition.
  const byPart = new Map();
  for (const s of (stats.streams || [])) {
    byPart.set(`${s.topic}:${s.partition}`, { ...s });
  }
  const streamKeys = new Set();
  for (const d of (debug.queues || [])) {
    const key = `${d.topic}:${d.partition}`;
    streamKeys.add(key);
    const cur = byPart.get(key) || { topic: d.topic, partition: d.partition };
    cur.role = d.role;
    cur.materialized = d.materialized;
    cur.applied_upto = d.applied_upto;
    byPart.set(key, cur);
  }

  const entries = [...byPart.values()].filter(
    e => !search || String(e.topic).toLowerCase().includes(search)
  );

  const byTopic = {};
  for (const entry of entries) {
    (byTopic[entry.topic] ||= []).push(entry);
  }

  let html = "";
  if (entries.length === 0) {
    html = `<p class="queue-group-note">No stream partitions on this broker.</p>`;
  } else {
    html = Object.entries(byTopic)
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([topic, parts]) => {
        parts.sort((a, b) => a.partition - b.partition);
        const hosted = parts.find(p => p.durability != null);
        const durability = hosted?.durability ?? "-";
        const retention = hosted ? retentionLabel(hosted) : "-";
        const rows = parts.map(entry => {
          const hasStats = entry.head != null;
          const depth = hasStats ? Math.max(0, Number(entry.tail) - Number(entry.head)) : null;
          const role = entry.role ? humanizeSnake(entry.role) : "-";
          return `
            <tr class="queue-row">
              <td class="queue-part-cell">partition ${entry.partition}</td>
              <td>${escapeHtml(role)}</td>
              <td class="text-right">${hasStats ? entry.head : "-"}</td>
              <td class="text-right">${hasStats ? entry.tail : "-"}</td>
              <td class="text-right">${depth != null ? depth : "-"}</td>
              <td class="text-right">${entry.applied_upto != null ? entry.applied_upto : "-"}</td>
              <td class="text-right">${entry.live_subscriptions != null ? entry.live_subscriptions : "-"}</td>
              <td class="text-right">${entry.lag_evictions != null ? entry.lag_evictions : "-"}</td>
            </tr>`;
        }).join("");
        const durabilityChip = durability === "durable"
          ? '<span class="chip-ok">durable</span>'
          : `<span class="chip-plain">${escapeHtml(durability)}</span>`;
        return `
          <div class="queue-table-wrap">
            <div class="card-head">
              <span class="micro">stream</span>
              <span class="chip-group">${escapeHtml(topic)}</span>
              ${durabilityChip}
              <span class="chip-plain">retention ${escapeHtml(retention)}</span>
              <span class="queue-group-note">${parts.length} partition(s)</span>
            </div>
            <table class="table table-compact narrow metric-table queue-table">
              <tr>
                <th>Partition</th>
                <th>Role</th>
                <th class="text-right">Head</th>
                <th class="text-right">Tail</th>
                <th class="text-right">Retained</th>
                <th class="text-right">Applied</th>
                <th class="text-right">Subs</th>
                <th class="text-right">Lag recoveries</th>
              </tr>
              ${rows}
            </table>
          </div>`;
      }).join("");
  }

  container.innerHTML = html + streamReplicationHtml(debug, streamKeys);
}

// Follower-replication workers for STREAM partitions on this broker. The
// observability list is broker-wide, so filter it to the stream partitions in
// the debug snapshot (group None).
function streamReplicationHtml(debug, streamKeys) {
  const followers = (debug.replication_followers || []).filter(
    f => streamKeys.has(`${f.topic}:${f.partition}`)
  );
  if (followers.length === 0) return "";
  const rows = followers
    .slice()
    .sort((a, b) => a.topic.localeCompare(b.topic) || (a.partition - b.partition))
    .map(f => {
      const status = f.state?.status?.status || "unknown";
      return `
        <tr>
          <td title="${escapeHtml(f.topic)}">${escapeHtml(f.topic)}</td>
          <td class="text-right">${f.partition ?? 0}</td>
          <td><span class="queue-state-pill replica-status-${escapeHtml(status)}">${escapeHtml(humanizeSnake(status))}</span></td>
          <td class="text-right">${f.state?.message_next_offset ?? 0}</td>
          <td class="text-right">${f.state?.event_next_offset ?? 0}</td>
          <td>${escapeHtml(formatTime(f.state?.last_progress))}</td>
          <td class="text-right">${f.state?.next_delay_ms ?? 0}ms</td>
          <td>${f.busy ? "yes" : "no"}</td>
        </tr>`;
    }).join("");
  return `
    <h5 class="metrics-header queue-group-heading">Stream replication (follower workers on this broker)</h5>
    <p class="queue-group-note">Durable streams this broker is replicating from their owners, with how far each has pulled (records and cursor commits).</p>
    <div class="queue-table-wrap">
      <table class="table table-compact narrow metric-table queue-table">
        <tr>
          <th>Topic</th>
          <th class="text-right">Partition</th>
          <th>Status</th>
          <th class="text-right">Record next</th>
          <th class="text-right">Cursor next</th>
          <th>Last progress</th>
          <th class="text-right">Next poll</th>
          <th>Busy</th>
        </tr>
        ${rows}
      </table>
    </div>`;
}

// ---- create stream ----
function setCreateMessage(text, kind) {
  const node = document.getElementById("create-message");
  node.textContent = text;
  node.dataset.kind = kind || "info";
}

async function submitCreateStream() {
  const topic = document.getElementById("create.topic").value.trim();
  const count = Number(document.getElementById("create.partitions").value) || 1;
  const durability = document.getElementById("create.durability").value;
  if (!topic) return setCreateMessage("Enter a topic.", "warning");
  if (!(count >= 1)) return setCreateMessage("Partition count must be at least 1.", "warning");

  const body = { topic, partition_count: count, durability };
  const records = document.getElementById("create.max_records").value.trim();
  const bytes = document.getElementById("create.max_bytes").value.trim();
  const age = document.getElementById("create.max_age_ms").value.trim();
  if (records !== "") body.max_records = Number(records);
  if (bytes !== "") body.max_bytes = Number(bytes);
  if (age !== "") body.max_age_ms = Number(age);

  const { ok, data } = await apiPost("/admin/api/streams", body);
  if (ok) {
    setCreateMessage(`Created stream "${topic}" with ${count} partition(s).`, "info");
    document.getElementById("create.topic").value = "";
    refresh();
  } else {
    setCreateMessage(`Failed: ${data?.message || data?.error || "request failed"}`, "warning");
  }
}

document.getElementById("create.submit").addEventListener("click", submitCreateStream);
document.getElementById("create-toggle").addEventListener("click", () => {
  const panel = document.getElementById("create-panel");
  panel.hidden = !panel.hidden;
  if (!panel.hidden) document.getElementById("create.topic").focus();
});
wireUrlFilter(document.getElementById("stream-search"), "q", refresh);

autoRefresh(refresh, 2000);
refresh();
</script>
{% endblock %}
